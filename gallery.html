<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gallery — Saint "D" Public School</title>
<meta name="description" content="Photo gallery of Saint D Public School — campus, classrooms, events, sports, hostel and more.">
<link rel="stylesheet" href="style.css">
<link rel="icon" type="image/png" href="assets/logo-round.png">
<style>
.gallery-controls {
  display: flex;
  gap: 0.7rem;
  flex-wrap: wrap;
  margin-bottom: 2.5rem;
  align-items: center;
}
.filter-btn {
  background: var(--olive);
  color: var(--forest);
  border: 2px solid transparent;
  padding: 10px 22px;
  border-radius: 50px;
  font-weight: 700;
  font-size: 10px;
  cursor: pointer;
  transition: all 0.4s var(--ease-premium);
  font-family: 'Inter', sans-serif;
  letter-spacing: 0.15em;
  text-transform: uppercase;
}
.filter-btn:hover, .filter-btn.active {
  background: var(--forest);
  color: var(--cream);
}

/* Upload zone */
.upload-zone {
  border: 3px dashed var(--moss);
  border-radius: 2.5rem;
  padding: 3rem 2rem;
  text-align: center;
  background: var(--olive);
  cursor: pointer;
  transition: all 0.4s var(--ease-premium);
  margin-bottom: 3rem;
  position: relative;
}
.upload-zone:hover { border-color: var(--forest); background: var(--sage); }
.upload-zone input[type="file"] {
  position: absolute; inset: 0;
  opacity: 0; cursor: pointer; z-index: 5;
}
.upload-zone .uz-icon { font-size: 3rem; margin-bottom: 1rem; }
.upload-zone h3 { color: var(--forest); font-weight: 700; margin-bottom: 0.4rem; }
.upload-zone p { color: var(--forest); opacity: 0.5; font-size: 0.85rem; }

/* Masonry-style gallery */
.gallery-grid {
  columns: 3;
  column-gap: 1.5rem;
  gap: 1.5rem;
}
.gallery-item {
  break-inside: avoid;
  margin-bottom: 1.5rem;
  border-radius: 2.5rem;
  overflow: hidden;
  position: relative;
  cursor: pointer;
  box-shadow: 0 12px 40px var(--forest-shadow);
  transition: all 0.5s var(--ease-premium);
}
.gallery-item:hover { transform: scale(1.02); box-shadow: 0 20px 50px rgba(10, 37, 64,0.25); }
.gallery-item img {
  width: 100%; height: auto;
  display: block;
  object-fit: cover;
}
.gallery-item .gi-overlay {
  position: absolute; inset: 0;
  background: rgba(10, 37, 64, 0.3);
  backdrop-filter: blur(2px);
  opacity: 0;
  transition: opacity 0.4s var(--ease-premium);
  display: flex;
  align-items: flex-end;
  padding: 1.5rem;
}
.gallery-item:hover .gi-overlay { opacity: 1; }
.gi-overlay span {
  color: var(--cream);
  font-weight: 700;
  font-size: 10px;
  letter-spacing: 0.2em;
  text-transform: uppercase;
}
.gi-delete {
  position: absolute;
  top: 12px; right: 12px;
  background: rgba(10, 37, 64,0.8);
  color: var(--cream);
  border: none;
  border-radius: 50%;
  width: 32px; height: 32px;
  font-size: 0.8rem;
  cursor: pointer;
  display: none;
  align-items: center;
  justify-content: center;
  z-index: 10;
}
.gallery-item:hover .gi-delete { display: flex; }

/* Category tags */
.cat-tag {
  position: absolute;
  top: 12px; left: 12px;
  background: rgba(10, 37, 64, 0.7);
  color: var(--cream);
  font-size: 9px;
  font-weight: 700;
  padding: 5px 12px;
  border-radius: 50px;
  text-transform: uppercase;
  letter-spacing: 0.15em;
  backdrop-filter: blur(4px);
}

/* Lightbox */
.lightbox {
  display: none;
  position: fixed; inset: 0;
  background: rgba(10, 37, 64, 0.95);
  z-index: 1000;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
.lightbox.open { display: flex; }
.lightbox img {
  max-width: 90vw;
  max-height: 85vh;
  border-radius: 2rem;
  object-fit: contain;
  box-shadow: 0 24px 60px rgba(0,0,0,0.4);
}
.lb-close {
  position: absolute;
  top: 1.5rem; right: 1.5rem;
  background: rgba(230, 240, 250,0.15);
  color: var(--cream);
  border: none;
  border-radius: 50%;
  width: 48px; height: 48px;
  font-size: 1.2rem;
  cursor: pointer;
  transition: background 0.3s var(--ease-premium);
}
.lb-close:hover { background: rgba(230, 240, 250,0.3); }
.lb-caption {
  position: absolute;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  background: rgba(10, 37, 64,0.8);
  color: var(--cream);
  padding: 10px 24px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  backdrop-filter: blur(6px);
  white-space: nowrap;
}

/* Category picker */
.category-picker {
  display: flex;
  gap: 0.5rem;
  flex-wrap: wrap;
  justify-content: center;
  margin-top: 1rem;
}
.cat-pick-btn {
  background: var(--cream);
  border: 2px solid var(--olive);
  color: var(--forest);
  padding: 6px 16px;
  border-radius: 50px;
  font-size: 10px;
  font-weight: 700;
  cursor: pointer;
  font-family: 'Inter', sans-serif;
  transition: all 0.3s var(--ease-premium);
  letter-spacing: 0.1em;
  text-transform: uppercase;
}
.cat-pick-btn:hover, .cat-pick-btn.selected {
  background: var(--forest); color: var(--cream); border-color: var(--forest);
}

.empty-state {
  text-align: center;
  padding: 5rem 2rem;
  color: var(--forest);
  opacity: 0.5;
}
.empty-state .es-icon { font-size: 4rem; margin-bottom: 1rem; }
.empty-state h3 { color: var(--forest); margin-bottom: 0.5rem; }

@media (max-width: 768px) {
  .gallery-grid { columns: 2; }
}
@media (max-width: 480px) {
  .gallery-grid { columns: 1; }
}
</style>
</head>
<body>
<div id="navbar"></div>

<div class="page-hero">
  <div class="page-hero-label">School Life</div>
  <h1>Gallery</h1>
  <p>Explore moments from our campus — classrooms, events, sports, hostel and more. Upload your own photos below!</p>
</div>

<div class="section">
  <!-- FILTER -->
  <div class="gallery-controls reveal" id="filterRow">
    <button class="filter-btn active" onclick="filterGallery('all',this)">All Photos</button>
    <button class="filter-btn" onclick="filterGallery('Campus',this)">🏫 Campus</button>
    <button class="filter-btn" onclick="filterGallery('Classroom',this)">📚 Classroom</button>
    <button class="filter-btn" onclick="filterGallery('Events',this)">🎉 Events</button>
    <button class="filter-btn" onclick="filterGallery('Sports',this)">⚽ Sports</button>
    <button class="filter-btn" onclick="filterGallery('Hostel',this)">🏠 Hostel</button>
    <button class="filter-btn" onclick="filterGallery('Results',this)">🏆 Results</button>
    <button class="filter-btn" onclick="filterGallery('Other',this)">📷 Other</button>
  </div>

  <div class="gallery-grid" id="galleryGrid"></div>
  <div class="empty-state" id="emptyState">
    <div class="es-icon">🖼️</div>
    <h3>No photos yet</h3>
    <p>Upload school photos using the box above to fill the gallery!</p>
  </div>
</div>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLightbox(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <img id="lbImg" src="" alt="">
  <div class="lb-caption" id="lbCaption"></div>
</div>

<div id="footer"></div>
<script src="shared.js"></script>
<script>
let photos = JSON.parse(localStorage.getItem('gallery-photos') || '[]');
let activeFilter = 'all';
let selectedCat = 'Campus';

// Preset school photos using building image
const presetPhotos = [
  { id: 'preset-1', src: 'assets/building.jpg', cat: 'Campus', caption: 'School Main Building' },
];

function init() {
  // Category picker
  document.querySelectorAll('.cat-pick-btn').forEach(btn => {
    btn.addEventListener('click', () => {
      document.querySelectorAll('.cat-pick-btn').forEach(b => b.classList.remove('selected'));
      btn.classList.add('selected');
      selectedCat = btn.dataset.cat;
    });
  });
  renderGallery();
}

function handleUpload(input) {
  if (!input.files?.length) return;
  Array.from(input.files).forEach(file => {
    const r = new FileReader();
    r.onload = e => {
      const photo = {
        id: 'photo-' + Date.now() + Math.random(),
        src: e.target.result,
        cat: selectedCat,
        caption: file.name.replace(/\.[^.]+$/, ''),
        timestamp: Date.now()
      };
      photos.push(photo);
      savePhotos();
      renderGallery();
    };
    r.readAsDataURL(file);
  });
  input.value = '';
}

function savePhotos() {
  try { localStorage.setItem('gallery-photos', JSON.stringify(photos)); } catch(e) {
    if (photos.length > 1) { photos.shift(); savePhotos(); }
  }
}

function deletePhoto(id) {
  photos = photos.filter(p => p.id !== id);
  savePhotos();
  renderGallery();
}

function renderGallery() {
  const grid = document.getElementById('galleryGrid');
  const empty = document.getElementById('emptyState');
  const all = [...presetPhotos, ...photos];
  const filtered = activeFilter === 'all' ? all : all.filter(p => p.cat === activeFilter);

  if (filtered.length === 0) {
    grid.innerHTML = '';
    empty.style.display = 'block';
    return;
  }
  empty.style.display = 'none';

  grid.innerHTML = filtered.map(p => `
    <div class="gallery-item" data-id="${p.id}" onclick="openLightbox('${p.src}','${p.caption || p.cat}')">
      <img src="${p.src}" alt="${p.caption || p.cat}" onerror="this.parentElement.style.display='none'">
      <div class="cat-tag">${p.cat}</div>
      <div class="gi-overlay"><span>${p.caption || p.cat}</span></div>
      ${p.id.startsWith('preset') ? '' : `<button class="gi-delete" onclick="event.stopPropagation();deletePhoto('${p.id}')">✕</button>`}
    </div>
  `).join('');
}

function filterGallery(cat, btn) {
  activeFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGallery();
}

function openLightbox(src, caption) {
  document.getElementById('lbImg').src = src;
  document.getElementById('lbCaption').textContent = caption;
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}
function closeLightbox(e) {
  if (!e || e.target === document.getElementById('lightbox') || e.target.classList.contains('lb-close')) {
    document.getElementById('lightbox').classList.remove('open');
    document.body.style.overflow = '';
  }
}
document.addEventListener('keydown', e => { if (e.key === 'Escape') closeLightbox({target:document.getElementById('lightbox')}); });

document.addEventListener('DOMContentLoaded', init);
</script>
</body>
</html>
